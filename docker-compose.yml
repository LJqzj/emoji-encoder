version: '3.8'

services:
  emoji-encoder:
    # 基于当前目录Dockerfile构建镜像
    build: .
    # 容器命名
    container_name: emoji-encoder-nextjs
    # 【关键】**不对外映射宿主机端口**！完全不暴露3000端口到公网
    # 仅宿主机内部Nginx可以通过docker网络访问容器，公网完全无法直连，极致安全
    ports:
      - "127.0.0.1:3000:3000"
    # 容器开机自启，服务器重启自动运行项目
    restart: always
